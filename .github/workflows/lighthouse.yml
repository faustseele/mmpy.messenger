name: Lighthouse Report
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Lighthouse Badge JSON
        run: |
          API_URL="https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=https://mmpy-chat.netlify.app/&category=performance"
          SCORE=$(curl -s "$API_URL" | jq '.lighthouseResult.categories.performance.score * 100 | round')
          
          if [ "$SCORE" -ge 90 ]; then 
            COLOR="brightgreen"
          elif [ "$SCORE" -ge 50 ]; then 
            COLOR="yellow"
          else 
            COLOR="red"
          fi
          
          mkdir -p .github/badges
          echo "{\"schemaVersion\": 1, \"label\": \"Lighthouse\", \"message\": \"${SCORE}%\", \"color\": \"${COLOR}\"}" > .github/badges/performance.json

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/performance.json
          git commit -m "chore: update lighthouse badge [skip ci]" || echo "No changes to commit"
          git push